<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <clipPath id="imgClip">
      <rect x="156" y="268" width="200" height="122" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#g)"/>

  <!-- Document body -->
  <rect x="126" y="80" width="260" height="340" rx="20" fill="white"/>

  <!-- Folded corner -->
  <path d="M326,80 L386,140 L326,140 Z" fill="#c7d2fe"/>

  <!-- PDF label -->
  <text x="152" y="195" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="58" fill="#6366f1">PDF</text>

  <!-- Down arrow -->
  <text x="228" y="256" font-family="Arial, sans-serif" font-size="30" fill="#818cf8">▼</text>

  <!-- Image preview box -->
  <rect x="156" y="268" width="200" height="122" rx="10" fill="#e0e7ff"/>

  <!-- Sky gradient inside image box -->
  <rect x="156" y="268" width="200" height="122" rx="10" fill="#dde4ff"/>

  <!-- Mountains (clipped inside image box) -->
  <polygon points="156,390 215,315 274,390" fill="#818cf8" clip-path="url(#imgClip)"/>
  <polygon points="248,390 304,338 356,390" fill="#6366f1" clip-path="url(#imgClip)"/>

  <!-- Sun (clipped) -->
  <circle cx="318" cy="293" r="18" fill="#fbbf24" clip-path="url(#imgClip)"/>
</svg>
