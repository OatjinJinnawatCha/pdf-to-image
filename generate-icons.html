<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Icon Generator</title>
  <style>
    body { font-family: sans-serif; background: #0f1117; color: #e2e8f0; padding: 40px; }
    h2 { margin-bottom: 24px; color: #a78bfa; }
    .grid { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end; }
    .item { text-align: center; }
    canvas { display: block; border-radius: 12px; margin-bottom: 8px; }
    button {
      display: block; width: 100%; padding: 8px 12px;
      background: #6366f1; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    }
    button:hover { background: #818cf8; }
    p { color: #8892b0; font-size: 0.85rem; margin-top: 24px; line-height: 1.6; }
  </style>
</head>
<body>
  <h2>Icon Generator — click each button to download</h2>
  <div class="grid" id="grid"></div>
  <p>
    After downloading, put all PNG files in the same folder as <code>index.html</code>, then commit &amp; push.<br>
    You can close this page after downloading.
  </p>

<script>
const SVG_CONTENT = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <clipPath id="imgClip">
      <rect x="156" y="268" width="200" height="122" rx="10"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#g)"/>
  <rect x="126" y="80" width="260" height="340" rx="20" fill="white"/>
  <path d="M326,80 L386,140 L326,140 Z" fill="#c7d2fe"/>
  <text x="152" y="195" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="58" fill="#6366f1">PDF</text>
  <text x="228" y="256" font-family="Arial, sans-serif" font-size="30" fill="#818cf8">&#9660;</text>
  <rect x="156" y="268" width="200" height="122" rx="10" fill="#dde4ff"/>
  <polygon points="156,390 215,315 274,390" fill="#818cf8" clip-path="url(#imgClip)"/>
  <polygon points="248,390 304,338 356,390" fill="#6366f1" clip-path="url(#imgClip)"/>
  <circle cx="318" cy="293" r="18" fill="#fbbf24" clip-path="url(#imgClip)"/>
</svg>`;

const SIZES = [
  { size: 16,  name: 'favicon-16.png' },
  { size: 32,  name: 'favicon-32.png' },
  { size: 180, name: 'apple-touch-icon.png' },
  { size: 192, name: 'icon-192.png' },
  { size: 512, name: 'icon-512.png' },
];

async function init() {
  const blob = new Blob([SVG_CONTENT], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.src = url;
  await new Promise(r => { img.onload = r; });

  const grid = document.getElementById('grid');

  for (const { size, name } of SIZES) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const display = Math.min(size, 120);
    canvas.style.width = display + 'px';
    canvas.style.height = display + 'px';
    canvas.style.imageRendering = 'pixelated';
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);

    const btn = document.createElement('button');
    btn.textContent = `↓ ${name}`;
    btn.onclick = () => {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = name;
      a.click();
    };

    const label = document.createElement('div');
    label.style.cssText = 'font-size:0.75rem;color:#8892b0;margin-bottom:6px';
    label.textContent = `${size}×${size}`;

    const item = document.createElement('div');
    item.className = 'item';
    item.append(canvas, label, btn);
    grid.appendChild(item);
  }

  URL.revokeObjectURL(url);
}

init();
</script>
</body>
</html>
